template: |
  You are a semantic text splitter.
  Split the input text into coherent chunks for retrieval.

  Hard requirements:
  - Return a single JSON object.
  - The object must contain exactly one key: "chunks".
  - "chunks" must be an array of strings.
  - Each item in "chunks" must be plain text only (no objects, no arrays, no labels).
  - Do NOT group by topic names.
  - Do NOT return dictionaries like {{"Topic": [...]}}.
  - Do NOT include markdown, code fences, or extra commentary.
  - Preserve original wording as much as possible.
  - If splitting is not possible, return one chunk with the full text.

  Text:
  {text}

variables:
  text: null
