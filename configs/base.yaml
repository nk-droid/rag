app:
  name: modular-rag
  version: 1.0
  env: default

models:
  llm:
    provider: ollama   # openai | anthropic | huggingface | ollama
    model_name: llama3.2:latest
    temperature: 0.2
    max_tokens: 1024

  embedding:
    provider: ollama
    model_name: qwen3-embedding:4b

vector_store:
  provider: faiss

retrieval:
  top_k: 20
  hybrid:
    candidate_multiplier: 4
    sparse_weight: 0.45
    dense_weight: 0.55
    fuse: true
  query_rewrite:
    template_name: rewrite_query.yaml
    parser_model: RewrittenQuery
  query_expansion:
    max_queries: 3
    template_name: multi_query.yaml
    parser_model: QueryVariants
  external:
    topic: general
    max_results: 5

indexers:
  embedding:
    path: data/indices/faiss_index
    vector_store:
      provider: faiss
  coarse:
    path: data/indices/coarse_index.json

chunking:
  recursive:
    chunk_size: 512
    chunk_overlap: 50
  semantic:
    template_name: chunk.yaml
    parser_model: SemanticChunks
    llm:
      provider: ollama
      model_name: llama3.2:latest

ranking:
  enabled: true
  fusion:
    method: rrf
    rrf_k: 60
    weights: [0.45, 0.55]    # [sparse, dense] when called from hybrid
    normalize_output: true
  embedding:
    model_name: qwen3-embedding:4b
    top_n: 5
    use_cache: true
    strategy: mmr
    lambda_param: 0.7
  cross_encoder:
    model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
    top_n: 3

generation:
  prompt:
    use_cache: true

postprocessing:
  self_critic:
    template_name: self_critic.yaml
    parser_model: SelfCritique
  refiner:
    template_name: refine_answer.yaml
    parser_model: RefinedAnswer

context:
  truncate:
    max_tokens: 256

memory:
  enabled: false
  store:
    max_entries: 10000

ingestion:
  directory:
    recursive: true

cache:
  enabled: true
  type: in_memory   # in_memory | redis
  namespace: rag
  version: v1
  default_ttl_sec: 900
  max_entries: 2000
  manifest_path: data/indices/init_manifest.json
  allow_nondeterministic_generation: false
  features:
    retrieval: true
    generation: false
    init_manifest: true
  ttl_sec:
    retrieval: 900
    generation: 3600

logging:
  level: INFO
  rich:
    enabled: true

evaluation:
  sources: data/raw/docs
  samples_file: data/raw/eval_set.json
  ragas:
    llm_model: llama3.2:latest
    embedding_model: qwen3-embedding:4b
  evaluators:
    - type: ragas
      id: ragas
