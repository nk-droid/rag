app:
  name: modular-rag
  version: 1.0
  env: default

models:
  llm:
    provider: ollama   # openai | anthropic | huggingface | ollama
    model_name: gpt-oss:120b-cloud
    temperature: 0.2
    max_tokens: 1024

  embedding:
    provider: ollama
    model_name: qwen3-embedding:0.6b

vector_store:
  provider: faiss

retrieval:
  top_k: 20
  hybrid:
    candidate_multiplier: 4
    sparse_weight: 0.45
    dense_weight: 0.55
    fuse: true
  graph:                       # shared by graph_retriever + graph_expander
    path: data/indices/repo_graph.json
    max_depth: 2
    max_neighbors: 20
    max_expanded_chunks: 20    # graph_expander only
    score_decay: 0.85
    min_score: 0.05            # graph_retriever only
  query_rewrite:
    template_name: rewrite_query.yaml
    parser_model: RewrittenQuery
  query_expansion:
    max_queries: 3
    template_name: multi_query.yaml
    parser_model: QueryVariants
  external:
    topic: general
    max_results: 5

indexers:
  embedding:
    path: data/indices/faiss_index
    vector_store:
      provider: faiss
  graph:
    path: data/indices/repo_graph.json
  coarse:
    path: data/indices/coarse_index.json

chunking:
  recursive:
    chunk_size: 512
    chunk_overlap: 50
  code_aware:
    chunk_size: 900
    chunk_overlap: 80
    include_import_chunk: true
  semantic:
    template_name: chunk.yaml
    parser_model: SemanticChunks
    llm:
      provider: ollama
      model_name: llama3.2:latest

ranking:
  enabled: true
  fusion:
    method: rrf
    rrf_k: 60
    weights: [0.45, 0.55]    # [sparse, dense] when called from hybrid
    normalize_output: true
  embedding:
    model_name: qwen3-embedding:4b
    top_n: 5
    use_cache: true
    strategy: mmr
    lambda_param: 0.7
  cross_encoder:
    model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
    top_n: 3
  colbert:
    top_n: 5

generation:
  prompt:
    use_cache: true

postprocessing:
  self_critic:
    template_name: self_critic.yaml
    parser_model: SelfCritique
  refiner:
    template_name: refine_answer.yaml
    parser_model: RefinedAnswer

context:
  truncate:
    max_tokens: 256

memory:
  enabled: false
  store:
    max_entries: 10000

ingestion:
  directory:
    recursive: true
  code:
    encoding: utf-8
  repo_cloner:
    root_dir: data/repos
    default_branch: main
    clone_depth: 1
    max_repo_size_mb: 500
  repo_file_filter:
    max_file_size_kb: 512
    max_files: 5000
  repo:
    enabled: true

cache:
  enabled: true
  type: in_memory   # in_memory | redis
  namespace: rag
  version: v1
  default_ttl_sec: 900
  max_entries: 2000
  manifest_path: data/indices/init_manifest.json
  allow_nondeterministic_generation: false
  features:
    retrieval: true
    generation: false
    init_manifest: true
  ttl_sec:
    retrieval: 900
    generation: 3600

intermediate:
  enabled: false
  path: data/intermediate
  include_text: true
  include_prompt: true
  include_config: false
  include_embeddings: false
  max_text_chars: 4000
  max_list_items: 200

logging:
  level: INFO
  rich:
    enabled: true

evaluation:
  sources: data/raw/docs
  samples_file: data/raw/eval_set.json
  ragas:
    max_workers: 2
    llm_model: gemma4:31b-cloud
    embedding_model: qwen3-embedding:4b
  evaluators:
    - type: ragas
      id: ragas
