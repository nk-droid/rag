# Verbose pipeline that exposes every stage as a separate step so the
# runtime log shows each component's I/O. Useful when tracing why a
# specific query produces unexpected output. Not optimised for speed.

init_pipeline:
  steps:
    - { name: loader, component: directory_loader }
    - { name: chunk, component: recursive_chunker }
    - { name: index, component: [embedding_indexer, coarse_indexer] }

pipeline:
  steps:
    - { name: query_clean, component: query_cleaner }
    - { name: query_rewrite, component: query_rewriter }
    - { name: query_expand, component: multi_query_generator }
    # fuse=false leaves sparse_retrieved / dense_retrieved on the payload so the next step can inspect each side.
    - { name: retrieve, component: hybrid_retriever, fuse: false }
    - { name: rank_fusion, component: rank_fusion }
    - { name: rerank, component: embedding_ranker }
    - { name: context_build, component: context_builder }
    - { name: context_merge, component: context_merger }
    - { name: context_trunc, component: context_truncator }
    - { name: prompt, component: prompt_builder, template_name: summarize.yaml, parser: Answer }
    - { name: generate, component: llm_generator }
    - { name: critic, component: self_critic }
    - { name: refine, component: refiner }
    - { name: parser, component: output_parser, parser: Answer }
